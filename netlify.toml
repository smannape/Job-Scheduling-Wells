// Add team
document.getElementById('btn-newteam').addEventListener('click',()=>openModal('modal-team'));
document.getElementById('btn-saveteam').addEventListener('click',()=>{
  const name  = document.getElementById('t-name').value.trim()||'New Team';
  const idx   = TEAMS.length;
  const id    = String.fromCharCode(65+idx);
  TEAMS.push({id, name, members:+(document.getElementById('t-members').value)||4, av:AV_CLS[idx%AV_CLS.length], base:document.getElementById('t-gc').value});
  const o=document.createElement('option'); o.value=id; o.textContent='Team '+name;
  document.getElementById('sel-team').appendChild(o);
  closeModal('modal-team');
  renderAll();
  showToast(`Team ${name} added`);
});

// Initial render
renderAll();
</script>
</body>
</html>
